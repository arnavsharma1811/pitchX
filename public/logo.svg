<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="680" fill="#000000"/>
  
  <!-- Diagonal slash line - top right to bottom left -->
  <line x1="420" y1="160" x2="260" y2="520" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  
  <!-- Orbital ellipse - tilted -->
  <ellipse cx="340" cy="340" rx="95" ry="38" 
    transform="rotate(-35 340 340)" 
    fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Second diagonal - top left to bottom right, thinner -->
  <line x1="255" y1="175" x2="425" y2="505" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
